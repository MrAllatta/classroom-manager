    College Board SSD accommodations must be requested well in advance of the
    exam (typically fall semester). Flag students with plans early. Teacher-level
    accommodations and College Board accommodations are separate processes.
  calculator_policy: >
    AP Statistics permits a graphing calculator on the entire exam. Verify
    that students are familiar with their approved calculator model.

pacing:
  curriculum_reference: null
  pacing_guide: null
  note: Pacing is constrained by the AP exam date. Backward-map from May exam.

notes: >
  AP course. Smaller section. Screened course but students may carry plans.
  Do not conflate AP enrollment with absence of support needs. SSD accommodation
  coordination with College Board is a separate workflow from classroom accommodations.
