special_education:
  estimated_iep_count: 3
  estimated_504_count: 3
  estimated_percent_with_plan: 25.0
  common_accommodation_codes: []
  differentiation_note: >
    AP course context does not reduce accommodation obligations. Students with
    IEP or 504 plans receive all mandated accommodations on teacher-administered
    assessments. AP exam accommodations are managed separately through College Board
    and must be applied for in advance (typically by November of the exam year).
    See College Board SSD (Services for Students with Disabilities) process.
  ict_model: false
  co_teacher_coverage: none

ap_exam:
  administering_body: College Board
  exam_month: May
  ssd_deadline_note: >
    College Board SSD accommodations must be requested well in advance of the
    exam (typically fall semester). Flag students with plans early. Teacher-level
    accommodations and College Board accommodations are separate processes.
  calculator_policy: >
    AP Statistics permits a graphing calculator on the entire exam. Verify
    that students are familiar with their approved calculator model.

pacing:
  curriculum_reference: data/courses/ap_statistics/scope.yaml
  pacing_guide: null
  note: >
    Pacing is constrained by the AP exam, not the June last day of school. Scope uses 144
    instructional weekdays (first day of school through the calendar day before the exam,
    per data/school/calendar_2026-27.yaml) — the compressed window NY state AP courses must
    plan within. Backward-map from the May exam; see course scope unit 10.

notes: >
  AP course. Smaller section. Screened course but students may carry plans.
  Do not conflate AP enrollment with absence of support needs. SSD accommodation
  coordination with College Board is a separate workflow from classroom accommodations.
