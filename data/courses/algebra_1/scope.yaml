units:
  - unit_number: 1
    title: "Foundations: Numbers, Expressions, and the Language of Algebra"
    instructional_days: 15
    summative_assessment: end_of_unit_test
    ccss_standards: [AI-N.RN.3, AI-A.SSE.1a, AI-A.SSE.1b]
    essential_questions:
      - What makes an expression meaningful in a mathematical context?
      - How does the number system extend beyond integers, and why does it matter?
      - How do we communicate mathematical relationships using symbolic language?

  - unit_number: 2
    title: Equations and Inequalities in One Variable
    instructional_days: 18
    summative_assessment: end_of_unit_test
    ccss_standards: [AI-A.CED.1, AI-A.CED.4, AI-A.REI.1a, AI-A.REI.3]
    essential_questions:
      - What does it mean to 'solve' an equation, and what justifies each step?
      - How are equations and inequalities different, and how are their solution sets different?
      - How do we model real-world constraints using equations and inequalities?

  - unit_number: 3
    title: Linear Functions and Their Graphs
    instructional_days: 22
    summative_assessment: end_of_unit_test
    ccss_standards: [AI-F.IF.1, AI-F.IF.2, AI-F.IF.4a, AI-F.IF.5, AI-F.IF.7a, AI-A.CED.2]
    essential_questions:
      - What is a function, and how is it different from a general relation?
      - What does the graph of a linear function tell us about the relationship it models?
      - How do rate of change and initial value appear in equations, tables, and graphs?

  - unit_number: 4
    title: Writing and Interpreting Linear Equations
    instructional_days: 16
    summative_assessment: end_of_unit_test
    ccss_standards: [AI-A.CED.2, AI-F.IF.6, AI-F.BF.1a, AI-F.LE.1a, AI-F.LE.1b, AI-F.LE.5]
    essential_questions:
      - Why are there multiple forms of a linear equation, and when is each form most useful?
      - How do we build a linear model from data or a verbal description?
      - What do slope and y-intercept mean in a real-world context?

  - unit_number: 5
    title: Systems of Equations and Inequalities
    instructional_days: 18
    summative_assessment: end_of_unit_test
    ccss_standards:
      [AI-A.CED.3, AI-A.REI.6a, AI-A.REI.7a, AI-A.REI.10, AI-A.REI.11, AI-A.REI.12]
    essential_questions:
      - When two linear relationships interact, what does the solution to a system tell us?
      - How do different solution methods compare in efficiency and clarity?
      - How do we represent and interpret constraints using systems of inequalities?

  - unit_number: 6
    title: Exponents and Exponential Functions
    instructional_days: 16
    summative_assessment: end_of_unit_test
    ccss_standards: [AI-A.SSE.3c, AI-F.LE.1c, AI-F.LE.2, AI-F.LE.3, AI-F.LE.5, AI-F.BF.1a]
    essential_questions:
      - What distinguishes exponential growth from linear growth?
      - How do properties of exponents connect to the behavior of exponential functions?
      - Where do exponential models appear in the real world, and what are their limits?

  - unit_number: 7
    title: Polynomial Expressions and Operations
    instructional_days: 14
    summative_assessment: end_of_unit_test
    ccss_standards: [AI-A.SSE.2, AI-A.APR.1, AI-A.APR.3]
    essential_questions:
      - How are polynomials similar to and different from integers as mathematical objects?
      - What does the structure of a polynomial expression reveal about its behavior?
      - How do operations on polynomials prepare us for solving quadratic equations?

  - unit_number: 8
    title: Factoring and Solving Quadratic Equations
    instructional_days: 20
    summative_assessment: end_of_unit_test
    ccss_standards: [AI-A.SSE.2, AI-A.REI.4a, AI-A.REI.4b, AI-A.APR.3]
    essential_questions:
      - Why do quadratic equations sometimes have two solutions, one solution, or no real solutions?
      - How do different solution methods (factoring, completing the square, quadratic formula) relate to each other?
      - What does it mean to 'factor' an expression, and what do the factors reveal?

  - unit_number: 9
    title: Quadratic Functions and Their Graphs
    instructional_days: 18
    summative_assessment: end_of_unit_test
    ccss_standards:
      [AI-F.IF.4a, AI-F.IF.5, AI-F.IF.7a, AI-F.IF.7b, AI-F.IF.8a, AI-F.BF.3a, AI-A.CED.1]
    essential_questions:
      - How does the vertex form of a quadratic reveal information that standard form does not?
      - What do transformations of a quadratic function look like graphically and algebraically?
      - How do we choose the right form of a quadratic equation for a given purpose?

  - unit_number: 10
    title: "Statistics: Describing and Interpreting Data"
    instructional_days: 13
    summative_assessment: end_of_unit_test
    ccss_standards:
      [AI-S.ID.1, AI-S.ID.2, AI-S.ID.3, AI-S.ID.5, AI-S.ID.6, AI-S.ID.6a, AI-S.ID.7, AI-S.ID.8, AI-S.ID.9]
    essential_questions:
      - How do we choose the right summary statistics and displays to describe a data set?
      - What does a linear model tell us, and how do we evaluate how well it fits?
      - Why is the distinction between correlation and causation important in real-world reasoning?
